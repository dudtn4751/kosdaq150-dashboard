name: Daily Update & Healthcheck

on:
  schedule:
    # 매일 07:00 KST = 22:00 UTC (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas finance-datareader openpyxl

      - name: Run macro update script
        run: |
          python scripts/update_macro.py

      - name: Run auto repair (캐시 갱신)
        run: |
          python scripts/auto_repair.py

      - name: Run healthcheck (최종 검증)
        id: healthcheck
        continue-on-error: true
        run: |
          python scripts/healthcheck.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/macro_calendar.json data/healthcheck_status.json kosdaq_cache.csv gics_cache.json kosdaq150_constituents.json
          git diff --staged --quiet || (git commit -m "auto: 데이터 자동 업데이트 $(date +%Y-%m-%d)" && git push)

      - name: Fail if healthcheck failed
        if: steps.healthcheck.outcome == 'failure'
        run: exit 1

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'healthcheck-fail',
            });
            const duplicate = issues.data.find(i => i.title.includes(today));
            if (!duplicate) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[헬스체크 실패] ${today} 대시보드 오류 감지`,
                body: `## 대시보드 헬스체크 실패\n\n` +
                      `**일시**: ${today}\n` +
                      `**Actions 로그**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                      `자동 복구를 시도했지만 일부 항목이 여전히 실패합니다.\n` +
                      `위 로그에서 원인을 확인하고 수동 조치해주세요.\n\n` +
                      `---\n_이 이슈는 자동 생성되었습니다._`,
                labels: ['healthcheck-fail'],
              });
            }
