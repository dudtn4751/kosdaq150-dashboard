name: Daily Macro Update

on:
  schedule:
    # 매일 07:00 KST = 22:00 UTC (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run macro update script
        run: |
          python scripts/update_macro.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/macro_calendar.json
          git diff --staged --quiet || (git commit -m "auto: 매크로 일정 자동 업데이트 $(date +%Y-%m-%d)" && git push)
